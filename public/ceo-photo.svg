<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="100"/>
  
  <!-- Professional suit silhouette -->
  <rect x="60" y="80" width="80" height="60" fill="url(#primary)" rx="8"/>
  <rect x="70" y="90" width="60" height="40" fill="#ffffff" rx="4"/>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="25" fill="#fbbf24"/>
  
  <!-- Hair -->
  <path d="M75 45 Q100 35 125 45 Q130 50 125 55 Q100 65 75 55 Q70 50 75 45" fill="#92400e"/>
  
  <!-- Eyes -->
  <circle cx="92" cy="58" r="3" fill="#1f2937"/>
  <circle cx="108" cy="58" r="3" fill="#1f2937"/>
  
  <!-- Smile -->
  <path d="M90 68 Q100 72 110 68" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Tie -->
  <path d="M95 90 L100 110 L105 90" fill="url(#primary)"/>
  
  <!-- Decorative elements -->
  <circle cx="85" cy="45" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="115" cy="45" r="2" fill="#ffffff" opacity="0.6"/>
  
  <!-- Professional badge -->
  <circle cx="160" cy="40" r="15" fill="url(#primary)"/>
  <text x="160" y="45" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">CEO</text>
  
  <!-- Subtle border -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#d1d5db" stroke-width="2"/>
</svg>
